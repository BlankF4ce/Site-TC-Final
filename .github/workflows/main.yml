name: Deploy via ftp

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: FTP Deploy Locaweb
        uses: locaweb/ftp-deploy@1.0.0
        with:
          host: ${{ secrets.HOST }}
          user: ${{ secrets.USER }}
          password: ${{ secrets.PASS }}
          localDir: "./"
          remoteDir: "./site_html/"
          options: "--delete -x ^node_modules/ -x ^\\.github/ -x ^\\.githubworkflows/ -x ^translacat-site\\.zip$ -x ^package-lock\\.json$ -x ^package\\.json$ -x ^README\\.md$"
